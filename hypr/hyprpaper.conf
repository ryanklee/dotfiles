# Baseline mapping: DP-1=primary, DP-2=secondary (was reversed pre-2026-05).
# Live config is regenerated by hapax-theme-apply at runtime via atomic
# symlink swap reflecting the current working-mode (rnd vs research).
wallpaper {
    monitor = DP-1
    path = /home/hapax/.config/hypr/wallpaper-rnd-primary.png
}

wallpaper {
    monitor = DP-2
    path = /home/hapax/.config/hypr/wallpaper-rnd-secondary.png
}

splash = false
