
# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# autogenerated = 1

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
# Primary (left): Dell S2721DGF — 27" 2560x1440 FreeSync Premium Pro
# 120Hz via DisplayPort (switched from HDMI 2026-03-29)
monitor = DP-2, 2560x1440@120, 0x0, 1
# Secondary (right): Dell U2412M — 24" 1920x1200 60Hz IPS — Logos monitor
# y=240 bottom-aligns with the taller primary monitor (1440-1200=240)
monitor = DP-1, 1920x1200@60, 2560x240, 1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = foot
$fileManager = yazi
$menu = fuzzel
$logos = hapax-logos-app


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# Set R&D mode + theme BEFORE waybar/mako so they have correct state on first render
exec-once = mkdir -p ~/.cache/hapax && echo rnd > ~/.cache/hapax/working-mode && ~/.local/bin/hapax-theme-apply rnd

exec-once = systemctl --user start waybar.service
exec-once = mako
exec-once = solaar --window=hide
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --watch cliphist store
# exec-once = hypridle  # disabled — no power saving
exec-once = hyprpaper
exec-once = ~/.local/bin/hypr-scripts/singleton-guard.sh
exec-once = ~/.local/bin/hypr-scripts/default-workspaces.sh
exec-once = hyprsunset -t 3200
exec-once = qs-overview start


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,32
env = XCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,32

# NVIDIA — required for hardware-accelerated Wayland rendering
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = NVD_BACKEND,direct
env = QT_QPA_PLATFORM,wayland
env = MOZ_ENABLE_WAYLAND,1

# Qt/GTK dark theme
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GTK_THEME,gruvbox-dark-gtk
env = GTK_CSD,0


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

permission = /usr/(bin|local/bin)/grim, screencopy, allow
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/(bin|local/bin)/slurp, screencopy, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 2
    gaps_out = 4

    border_size = 2

    # Gruvbox R&D default — overridden at runtime by hapax-theme-apply
    col.active_border = rgb(fabd2f)
    col.inactive_border = rgb(504945)

    resize_on_border = true
    allow_tearing = true
    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 8
    rounding_power = 2.0

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.92

    dim_inactive = true
    dim_strength = 0.12

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(1a1a1aee)
        color_inactive = rgba(1a1a1a88)
    }

    # Disabled — saves GPU for compute (Ollama, faster-whisper, etc.)
    blur {
        enabled = false
    }
}

# Window opacity — active inactive
windowrule {
    name = opacity-obsidian
    match:class = obsidian
    opacity = 0.95 0.90
}
windowrule {
    name = opacity-vscode
    match:class = code-url-handler
    opacity = 0.98 0.92
}
windowrule {
    name = opacity-firefox
    match:class = firefox
    opacity = 1.0 0.95
}

# Tearing for fullscreen games
windowrule {
    name = tear-steam
    match:class = steam_app_.*
    immediate = true
}
windowrule {
    name = tear-gamescope
    match:class = gamescope
    immediate = true
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Snappy animations tuned for 120Hz
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     5,     easeOutQuint
    animation = border,        1,     3,     easeOutQuint
    animation = windows,       1,     3,     easeOutQuint
    animation = windowsIn,     1,     2.5,   easeOutQuint, popin 80%
    animation = windowsOut,    1,     1,     linear,       popin 80%
    animation = fadeIn,        1,     1.2,   almostLinear
    animation = fadeOut,       1,     1,     almostLinear
    animation = fade,          1,     2,     quick
    animation = layers,        1,     2.5,   easeOutQuint
    animation = layersIn,      1,     2.5,   easeOutQuint, fade
    animation = layersOut,     1,     1,     linear,       fade
    animation = fadeLayersIn,  1,     1.2,   almostLinear
    animation = fadeLayersOut, 1,     1,     almostLinear
    animation = workspaces,    1,     1.5,   almostLinear, fade
    animation = workspacesIn,  1,     1,     almostLinear, fade
    animation = workspacesOut, 1,     1.5,   almostLinear, fade
}


# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true
    preserve_split = true
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = rgb(0a0a0a)
    # Focus new windows that request it
    focus_on_activate = true
    # VRR/FreeSync disabled — causes blink clusters on NVIDIA open driver.
    # Fixed 120Hz is stable and sufficient for dev work.
    vrr = 0
}

cursor {
    no_hardware_cursors = false
}

render {
    # Disabled — causes blinks on NVIDIA open driver during scanout mode transitions
    # (fullscreen enter/exit, workspace population at login)
    direct_scanout = false
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = caps:ctrl_modifier,compose:ralt
    kb_rules =

    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat

    repeat_rate = 60
    repeat_delay = 250
    numlock_by_default = true

    touchpad {
        natural_scroll = false
    }
}

# MX Ergo S trackball (via Bolt receiver)
device {
    name = logitech-usb-receiver-mouse
    accel_profile = flat
    sensitivity = 0
    scroll_factor = 1.5
}

# MX Ergo S trackball (via direct Bluetooth) — verify with `hyprctl devices` when BT-connected
device {
    name = mx-ergo-s
    accel_profile = flat
    sensitivity = 0
    scroll_factor = 1.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# ── Core ──────────────────────────────────────────────────────────────────────
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, exec, $logos
bind = $mainMod, C, killactive,
bind = $mainMod, E, exec, foot -e yazi
bind = $mainMod, R, exec, $menu
bind = $mainMod, X, exec, wlogout
bind = $mainMod SHIFT, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod SHIFT, C, exec, hyprctl reload
bind = $mainMod, M, exec, ~/.local/bin/hapax-working-mode $([ $(~/.local/bin/hapax-working-mode) = rnd ] && echo research || echo rnd)

# ── Windows ───────────────────────────────────────────────────────────────────
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen, 0
bind = $mainMod SHIFT, Space, togglefloating,
bind = $mainMod, A, focusurgentorlast,

# Window grouping (tabs)
bind = $mainMod, G, togglegroup,
bind = $mainMod, TAB, changegroupactive, f
bind = $mainMod SHIFT, TAB, changegroupactive, b

# ── Focus — vim keys + arrows ────────────────────────────────────────────────
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# ── Move windows — vim keys + arrows ─────────────────────────────────────────
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# ── Screenshots (grim + slurp direct, no wrapper lock files) ─────────────────
bind = , Print, exec, grim -s 0.5 - | tee ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png | wl-copy --type image/png && notify-send "Screenshot saved + copied"
bind = $mainMod, Print, exec, grim -s 0.5 -g "$(slurp)" - | tee ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png | wl-copy --type image/png && notify-send "Screenshot saved + copied"
bind = $mainMod SHIFT, Print, exec, grim -g "$(slurp)" - | satty -f -
bind = $mainMod ALT, Print, exec, grim -s 0.5 -g "$(hyprctl activewindow -j | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"')" - | tee ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png | wl-copy --type image/png && notify-send "Screenshot saved + copied"

# ── Screen recording (wf-recorder) ───────────────────────────────────────────
bind = $mainMod, W, exec, ~/.local/bin/hypr-scripts/screen-record-toggle.sh
bind = $mainMod SHIFT, W, exec, ~/.local/bin/hypr-scripts/screen-record-toggle.sh region

# ── Clipboard ─────────────────────────────────────────────────────────────────
# SUPER+Y: pick from history via fuzzel, then auto-paste the selection
bind = $mainMod, Y, exec, cliphist list | fuzzel -d | cliphist decode | wl-copy && wtype -M ctrl -k v -m ctrl

# ── Notifications (mako) ─────────────────────────────────────────────────────
bind = $mainMod, D, exec, makoctl mode -t do-not-disturb
bind = $mainMod, O, exec, makoctl invoke
bind = $mainMod SHIFT, O, exec, makoctl dismiss -a

# ── Tools ─────────────────────────────────────────────────────────────────────
bind = $mainMod, P, exec, hyprpicker -a
bind = $mainMod, B, exec, killall -SIGUSR1 waybar

# ── System ────────────────────────────────────────────────────────────────────
bind = $mainMod SHIFT, Escape, exec, hyprlock

# Hotkey cheatsheet popup (toggle — kills existing or spawns new)
bind = $mainMod, F1, exec, hyprctl clients -j | grep -q '"Hotkey Cheatsheet"' && hyprctl dispatch closewindow title:^Hotkey Cheatsheet$ || foot --title="Hotkey Cheatsheet" --override=pad=20x10 ~/.local/bin/hypr-scripts/hotkey-cheatsheet.sh

# ── Scratchpads ───────────────────────────────────────────────────────────────
bind = $mainMod, grave, exec, ~/.local/bin/hypr-scripts/llm-scratchpad.sh
bind = $mainMod SHIFT, grave, movetoworkspace, special:llm
bind = $mainMod, S, exec, ~/.local/bin/hypr-scripts/scratchpad.sh
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
bind = $mainMod, N, exec, ~/.local/bin/hypr-scripts/notepad-scratchpad.sh
bind = $mainMod SHIFT, N, movetoworkspace, special:notepad

# ── Workspaces (monitor-aware) ────────────────────────────────────────────────
# SUPER+N switches to WS N on primary or WS N+10 on secondary
bind = $mainMod, 1, exec, ~/.local/bin/hypr-scripts/workspace-switch.sh switch 1
bind = $mainMod, 2, exec, ~/.local/bin/hypr-scripts/workspace-switch.sh switch 2
bind = $mainMod, 3, exec, ~/.local/bin/hypr-scripts/workspace-switch.sh switch 3
bind = $mainMod, 4, exec, ~/.local/bin/hypr-scripts/workspace-switch.sh switch 4
bind = $mainMod, 5, exec, ~/.local/bin/hypr-scripts/workspace-switch.sh switch 5
bind = $mainMod, 6, exec, ~/.local/bin/hypr-scripts/workspace-switch.sh switch 6
bind = $mainMod, 7, exec, ~/.local/bin/hypr-scripts/workspace-switch.sh switch 7
bind = $mainMod, 8, exec, ~/.local/bin/hypr-scripts/workspace-switch.sh switch 8
bind = $mainMod, 9, exec, ~/.local/bin/hypr-scripts/workspace-switch.sh switch 9
bind = $mainMod, 0, exec, ~/.local/bin/hypr-scripts/workspace-switch.sh switch 9

bind = $mainMod SHIFT, 1, exec, ~/.local/bin/hypr-scripts/workspace-switch.sh move 1
bind = $mainMod SHIFT, 2, exec, ~/.local/bin/hypr-scripts/workspace-switch.sh move 2
bind = $mainMod SHIFT, 3, exec, ~/.local/bin/hypr-scripts/workspace-switch.sh move 3
bind = $mainMod SHIFT, 4, exec, ~/.local/bin/hypr-scripts/workspace-switch.sh move 4
bind = $mainMod SHIFT, 5, exec, ~/.local/bin/hypr-scripts/workspace-switch.sh move 5
bind = $mainMod SHIFT, 6, exec, ~/.local/bin/hypr-scripts/workspace-switch.sh move 6
bind = $mainMod SHIFT, 7, exec, ~/.local/bin/hypr-scripts/workspace-switch.sh move 7
bind = $mainMod SHIFT, 8, exec, ~/.local/bin/hypr-scripts/workspace-switch.sh move 8
bind = $mainMod SHIFT, 9, exec, ~/.local/bin/hypr-scripts/workspace-switch.sh move 9
bind = $mainMod SHIFT, 0, exec, ~/.local/bin/hypr-scripts/workspace-switch.sh move 9

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# ── Multi-monitor ────────────────────────────────────────────────────────
bind = $mainMod, comma, focusmonitor, l
bind = $mainMod, period, focusmonitor, r
bind = $mainMod SHIFT, comma, movewindow, mon:l
bind = $mainMod SHIFT, period, movewindow, mon:r
bind = $mainMod ALT, comma, swapactiveworkspaces, DP-2 DP-1

# ── Mouse ─────────────────────────────────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Thumb wheel gestures — flick left = copy, flick right = paste
bind = , mouse_left, exec, wl-paste -p 2>/dev/null | wl-copy
bind = , mouse_right, exec, wl-paste -n | wtype -

# ── Media ─────────────────────────────────────────────────────────────────────
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# ── Voice daemon ──────────────────────────────────────────────────────────────
# Push-to-talk (hold Super+V to talk, release to stop)
bindr = $mainMod, V, exec, ~/.local/bin/hypr-scripts/voice-ptt.sh release
bind = $mainMod, V, exec, ~/.local/bin/hypr-scripts/voice-ptt.sh press
# Agent invocation
bind = $mainMod SHIFT, V, exec, ~/.local/bin/hypr-scripts/voice-invoke.sh
# Voice daemon toggle (process-compose managed, not systemd — toggle via socket)
bind = $mainMod ALT, V, exec, hapax-toggle

# ── Resize submap ─────────────────────────────────────────────────────────────
bind = $mainMod ALT, R, submap, resize
submap = resize
binde = , H, resizeactive, -30 0
binde = , L, resizeactive, 30 0
binde = , K, resizeactive, 0 -30
binde = , J, resizeactive, 0 30
binde = , left, resizeactive, -30 0
binde = , right, resizeactive, 30 0
binde = , up, resizeactive, 0 -30
binde = , down, resizeactive, 0 30
bind = , Escape, submap, reset
bind = , Return, submap, reset
submap = reset


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

# Hotkey cheatsheet — centered float
windowrule {
    name = cheatsheet-float
    match:title = ^Hotkey Cheatsheet$
    float = yes
    size = 560 920
    center = true
}

# LLM scratchpad — left side, beside notepad
windowrule {
    name = llm-scratchpad
    match:workspace = special:llm
    float = yes
    size = 770 690
    move = 4 28
    opacity = 1.0 1.0
    border_size = 3
}

# General scratchpad — right side, beside notepad
windowrule {
    name = general-scratchpad
    match:workspace = special:magic
    float = yes
    size = 770 690
    move = 1786 28
    opacity = 1.0 1.0
    border_size = 3
}

# Notepad scratchpad — top-center, below waybar to mid-screen
windowrule {
    name = notepad-scratchpad
    match:workspace = special:notepad
    float = yes
    size = 1000 690
    move = 780 28
    opacity = 1.0 1.0
    border_size = 3
}
# ── Workspace → monitor bindings ─────────────────────────────────────────
# WS 1-9 on primary (DP-2), WS 11-19 on secondary (DP-1).
# Both monitors get independent 1-9 switching via workspace-switch.sh.
workspace = 1, monitor:DP-2, default:true
workspace = 2, monitor:DP-2
workspace = 3, monitor:DP-2
workspace = 4, monitor:DP-2
workspace = 5, monitor:DP-2
workspace = 6, monitor:DP-2
workspace = 7, monitor:DP-2
workspace = 8, monitor:DP-2
workspace = 9, monitor:DP-2
workspace = 11, monitor:DP-1, default:true
workspace = 12, monitor:DP-1
workspace = 13, monitor:DP-1
workspace = 14, monitor:DP-1
workspace = 15, monitor:DP-1
workspace = 16, monitor:DP-1
workspace = 17, monitor:DP-1
workspace = 18, monitor:DP-1
workspace = 19, monitor:DP-1

# Single-window workspaces: remove gaps (replaces removed no_gaps_when_only)
workspace = w[s1], gapsout:0, gapsin:0

# ── Logos window rules ───────────────────────────────────────────────────
# Hapax Logos Chrome app → always on WS 10 (secondary/right monitor), fullscreen
windowrule {
    name = logos-to-right-monitor
    match:class = ^chrome-localhost__terrain-Default$
    workspace = 11
    fullscreen = 1
}

# ── Floating rules for dialogs and system windows ─────────────────────
windowrule {
    name = float-file-dialogs
    match:title = ^(Open|Save|Save As|File Upload|Choose Files|Select a File|Select Folder)
    float = yes
    center = true
    size = 960 640
}

windowrule {
    name = float-auth-dialogs
    match:class = ^(polkit-gnome-authentication-agent-1|gcr-prompter|pinentry-.*)$
    float = yes
    center = true
}

windowrule {
    name = float-portal-dialogs
    match:class = ^(xdg-desktop-portal-gtk)$
    float = yes
    center = true
}

# ── Picture-in-Picture ────────────────────────────────────────────────
windowrule {
    name = pip-float
    match:title = ^(Picture.in.[Pp]icture)$
    float = yes
    pin = true
    keep_aspect_ratio = true
    size = 480 270
    move = 100% -280
}

# ── Group/tab styling (Gruvbox R&D default) ─────────────────────────
group {
    col.border_active = rgb(fabd2f)
    col.border_inactive = rgb(504945)
    groupbar {
        font_size = 11
        col.active = rgb(fabd2f)
        col.inactive = rgb(282828)
        text_color = rgb(ebdbb2)
    }
}

# ── App workspace pinning ─────────────────────────────────────────────
windowrule {
    name = chrome-to-ws3
    match:class = ^(google-chrome)$
    workspace = 3
}

windowrule {
    name = obs-to-ws5
    match:class = ^(com.obsproject.Studio)$
    workspace = 5
}

windowrule {
    name = keep-logos-opaque
    match:class = ^chrome-localhost__terrain-Default$
    opacity = 1.0 1.0
}


windowrule {
    name = keep-foot-opaque
    match:class = ^(foot)$
    opacity = 1.0 1.0
}



xwayland {
    force_zero_scaling = true
}

# ── Plugins ──────────────────────────────────────────────────────────────────
# No plugins loaded (hyprexpo, hyprbars, borders-plus-plus all removed —
# incompatible with Hyprland 0.54.2 or not installed via hyprpm)
