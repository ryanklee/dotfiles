# Hyprlock config — Solarized Dark research mode
# Dual monitor with research-mode color scheme

# ── Backgrounds ──────────────────────────────────────────────────────
background {
    monitor = HDMI-A-1
    path = /home/hapax/.config/hypr/wallpaper-research.png
    blur_passes = 0
}

background {
    monitor = DP-1
    path = /home/hapax/.config/hypr/wallpaper-research.png
    blur_passes = 0
}

# ── Primary monitor: password input ──────────────────────────────────
input-field {
    monitor = HDMI-A-1
    size = 320, 48
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.15
    outer_color = rgba(38, 139, 210, 0.8)
    inner_color = rgba(0, 43, 54, 0.95)
    font_color = rgba(147, 161, 161, 1.0)
    fade_on_empty = true
    placeholder_text = <i>Local Logon...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
    font_family = MxPlus IBM VGA 9x16
}

# Clock
label {
    monitor = HDMI-A-1
    text = $TIME
    font_size = 48
    font_family = MxPlus IBM VGA 9x16
    color = rgba(38, 139, 210, 0.9)
    position = 0, 100
    halign = center
    valign = center
}
