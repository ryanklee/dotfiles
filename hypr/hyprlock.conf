# hyprlock.conf — thin pointer to the active variant.
#
# The actual lock UI lives in ~/dotfiles/hypr/hyprlock-{rnd,research}.conf.
# hapax-theme-apply atomically swaps ~/.cache/hapax/theme/hyprlock-active.conf
# to point at the variant matching the current working mode. Hyprlock reads
# this file via the directive below; the variant content is sourced live.
#
# Self-bootstrap: if the cache symlink is missing on a fresh checkout,
# hapax-theme-apply creates it on first run.
source = ~/.cache/hapax/theme/hyprlock-active.conf
