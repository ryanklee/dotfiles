# Hyprlock config — R&D mode (Gruvbox Hard Dark)
# Logos design language §3.1, §11.2

# ── Backgrounds ──────────────────────────────────────────────────────
background {
    monitor = DP-2
    path = /home/hapax/.config/hypr/wallpaper-rnd.png
    blur_passes = 0
}

background {
    monitor = DP-1
    path = /home/hapax/.config/hypr/wallpaper-rnd.png
    blur_passes = 0
}

# ── Primary monitor: password input ──────────────────────────────────
input-field {
    monitor = DP-2
    size = 320, 48
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.15
    outer_color = rgba(250, 189, 47, 0.8)
    inner_color = rgba(29, 32, 33, 0.95)
    font_color = rgba(235, 219, 178, 1.0)
    fade_on_empty = true
    placeholder_text = <span foreground="#928374">password</span>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
    font_family = JetBrainsMono Nerd Font
}

# Clock
label {
    monitor = DP-2
    text = $TIME
    font_size = 48
    font_family = JetBrainsMono Nerd Font
    color = rgba(131, 165, 152, 0.9)
    position = 0, 100
    halign = center
    valign = center
}
