# Hapax tmux config — agent-optimized
# Wayland env refresh on reattach
set -g update-environment "WAYLAND_DISPLAY HYPRLAND_INSTANCE_SIGNATURE YDOTOOL_SOCKET DISPLAY"

# OSC 52 clipboard — copy works through tmux and SSH
set -g set-clipboard on
set -g allow-passthrough on

# Large scrollback for agent output capture
set -g history-limit 50000

# True color + undercurl support (foot terminal)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",foot:Tc,foot:RGB"

# Reduce escape delay (vim/fish responsiveness)
set -sg escape-time 10

# Focus events for Neovim autoread
set -g focus-events on

# Start windows/panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Mouse support
set -g mouse on

# Status bar — minimal
set -g status-style "bg=default,fg=colour7"
set -g status-left "#[fg=colour4]#S "
set -g status-right ""

# TPM — plugin manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect + Continuum settings
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
