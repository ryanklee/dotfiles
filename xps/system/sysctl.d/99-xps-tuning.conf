# Laptop + SSD tuning for rlk-xps-15-9500 (14GB RAM, NVMe)

# Prefer RAM over swap — with 14GB available we rarely need swap,
# and aggressive swapping hurts responsiveness.
vm.swappiness=10

# Keep inode/dentry caches longer — helps snappiness on repeated file ops.
vm.vfs_cache_pressure=50

# More inotify watches for file watchers (Chrome, snap, etc.).
fs.inotify.max_user_watches=524288

# NVMe is fast, no need to coalesce dirty pages aggressively.
vm.dirty_background_ratio=5
vm.dirty_ratio=10
