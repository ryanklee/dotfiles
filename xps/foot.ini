# foot terminal config — XPS 15
# Matches hapax-podium's foot font (JetBrainsMono Nerd Font), one size up
# because XPS gets bigger by default.

[main]
font=JetBrainsMono Nerd Font:size=13
font-bold=JetBrainsMono Nerd Font:size=13:weight=bold
dpi-aware=yes
pad=8x8

[key-bindings]
# Live zoom — works in any foot window, persists until close
font-increase=Control+plus Control+equal
font-decrease=Control+minus
font-reset=Control+0

[mouse-bindings]
# Middle-click paste is default; this enables drag-selection-auto-copy too
selection-override-modifiers=Shift

[cursor]
style=block
blink=yes

[scrollback]
lines=10000

# ── Gruvbox Hard Dark ─────────────────────────────────────────────────
# Matches hapax-podium R&D mode palette.
[colors]
foreground=ebdbb2
background=1d2021

# Normal
regular0=282828
regular1=cc241d
regular2=98971a
regular3=d79921
regular4=458588
regular5=b16286
regular6=689d6a
regular7=a89984

# Bright
bright0=928374
bright1=fb4934
bright2=b8bb26
bright3=fabd2f
bright4=83a598
bright5=d3869b
