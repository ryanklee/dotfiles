[Service]
# Auto-restart on hang/crash. The existing Restart=on-failure (from upstream unit)
# only catches crashes; this drop-in adds rate limiting + memory-cap auto-restart
# to handle the per-spawn worker-thread leak (1.1 GB after 48h observed).
RestartSec=3
StartLimitIntervalSec=60
StartLimitBurst=10

# Hard memory ceiling. Initial soak showed RSS plateau ~460 MB with G_SLICE=
# always-malloc + dual outputs + 9 polled modules + tray icons. 512 MB cap was
# too tight (boundary churn → ~10min restart cycles). 768 MB gives headroom
# for steady-state without letting a runaway leak reach the prior 1.1 GB level.
MemoryHigh=512M
MemoryMax=768M
# MemorySwapMax=0 already set in no-swap.conf; do not duplicate here.

# When OOM-killed, restart immediately (don't propagate to the user session).
OOMPolicy=continue

# G_SLICE=always-malloc disables glib's per-thread slab allocator. Slabs are the
# leak path: per-spawn worker threads each allocate a private slab arena that
# survives thread-death until process-death. Disabling slabs trades ~2% allocation
# speed for steady-state RSS that doesn't grow.
Environment=G_SLICE=always-malloc
Environment=GTK_USE_PORTAL=0
