[Service]
# Protect waybar from zram eviction under memory pressure.
# Global vm.swappiness=150 (set by 90-gpu-llm.conf for LLM workload) was
# aggressively compressing waybar pages — GTK event handlers would stall
# when clicks arrived, producing a total input blackout. This keeps
# waybar's working set (~200 MB) always resident.
MemorySwapMax=0
